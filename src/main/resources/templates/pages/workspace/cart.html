<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="content">
    <section class="setup-section" th:if="${activeCommerceSection == 'cart'}">
        <h2>카트</h2>
        <div class="existing-company-card commerce-card">
            <strong>Open Cart</strong>
            <p class="panel-copy" th:if="${commerceView.cart == null || #lists.isEmpty(commerceView.cart.items)}">
                카트가 비어 있습니다. 상품 상세에서 항목을 담아 주세요.
            </p>
            <div th:if="${commerceView.cart != null && !#lists.isEmpty(commerceView.cart.items)}">
                <div class="commerce-list commerce-list-stack" th:each="item : ${commerceView.cart.items}">
                    <div class="commerce-list">
                        <span th:text="${item.productName}">상품명</span>
                        <span th:text="|${item.quantity} x ${item.currencyCode} ${#numbers.formatDecimal(item.unitPrice, 1, 2)}|">수량</span>
                    </div>
                    <div class="commerce-list">
                        <span th:text="'합계 ' + ${item.currencyCode} + ' ' + ${#numbers.formatDecimal(item.lineTotal, 1, 2)}">합계</span>
                        <span th:text="'최소 주문 ' + ${item.minOrderQty} + '개'">Min qty</span>
                    </div>
                    <div class="hero-actions">
                        <form th:action="@{/commerce/cart/items/quantity}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="cartItemId" th:value="${item.cartItemId}">
                            <input class="setup-input"
                                   name="quantity"
                                   type="number"
                                   th:attr="min=${item.minOrderQty}"
                                   th:value="${item.quantity}">
                            <button class="hero-button hero-button-secondary" type="submit">수량 변경</button>
                        </form>
                        <form th:action="@{/commerce/cart/items/remove}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="cartItemId" th:value="${item.cartItemId}">
                            <button class="hero-button hero-button-secondary" type="submit">항목 제거</button>
                        </form>
                    </div>
                </div>
                <p class="panel-copy commerce-total"
                   th:text="'Total: ' + ${#numbers.formatDecimal(commerceView.cart.totalAmount, 1, 2)}">
                    Total
                </p>
                <div class="hero-actions">
                    <form th:action="@{/commerce/cart/clear}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="hero-button hero-button-secondary" type="submit">카트 비우기</button>
                    </form>
                </div>
                <div class="hero-actions" th:if="${commerceView.canCreatePurchaseRequest}">
                    <form th:action="@{/commerce/purchase-requests/draft}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="hero-button hero-button-primary" type="submit">구매 요청 초안 만들기</button>
                    </form>
                </div>
                <p class="panel-copy" th:if="${!commerceView.canCreatePurchaseRequest}">
                    현재 역할에서는 카트만 사용할 수 있습니다.
                </p>
            </div>
        </div>
    </section>
</th:block>
