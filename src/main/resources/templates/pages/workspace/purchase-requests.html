<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="content">
    <section class="setup-section" th:if="${activeCommerceSection == 'purchase-requests'}">
        <h2>구매 요청</h2>
        <div class="existing-company-card commerce-card">
            <strong>내 구매 요청</strong>
            <p class="panel-copy" th:if="${#lists.isEmpty(commerceView.purchaseRequests)}">
                아직 생성된 구매 요청이 없습니다.
            </p>
            <div th:if="${!#lists.isEmpty(commerceView.purchaseRequests)}" th:each="requestItem : ${commerceView.purchaseRequests}">
                <div class="commerce-list">
                    <span th:text="'요청 #' + ${requestItem.purchaseRequestId}">요청</span>
                    <span th:text="${requestItem.status}">DRAFT</span>
                </div>
                <div class="commerce-list">
                    <span th:text="'항목 수 ' + ${requestItem.itemCount}">항목 수</span>
                    <span th:text="${#numbers.formatDecimal(requestItem.totalAmount, 1, 2)}">0.00</span>
                </div>
                <div class="commerce-list commerce-list-stack" th:each="item : ${requestItem.items}">
                    <div class="commerce-list">
                        <span th:text="${item.productName}">상품명</span>
                        <span th:text="|${item.quantity} x ${item.currencyCode} ${#numbers.formatDecimal(item.unitPrice, 1, 2)}|">수량</span>
                    </div>
                    <div class="commerce-list">
                        <span th:text="'합계 ' + ${item.currencyCode} + ' ' + ${#numbers.formatDecimal(item.lineTotal, 1, 2)}">합계</span>
                        <span th:text="'상품 ID ' + ${item.productId}">상품 ID</span>
                    </div>
                </div>
                <div class="hero-actions" th:if="${requestItem.canSubmit}">
                    <form th:action="@{/commerce/purchase-requests/submit}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="purchaseRequestId" th:value="${requestItem.purchaseRequestId}">
                        <button class="hero-button hero-button-primary" type="submit">승인 요청으로 제출</button>
                    </form>
                </div>
                <div class="hero-actions" th:if="${requestItem.canCancel}">
                    <form th:action="@{/commerce/purchase-requests/cancel}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="purchaseRequestId" th:value="${requestItem.purchaseRequestId}">
                        <button class="hero-button hero-button-secondary" type="submit">초안 취소</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</th:block>
