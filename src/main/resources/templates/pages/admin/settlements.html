<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">
    <section class="setup-card" th:if="${activeSection == 'settlements'}">
        <p class="panel-kicker">정산</p>
        <h1>정산 관리</h1>
        <p class="setup-lead">
            배송 완료 주문을 개별 또는 일괄 정산할 수 있습니다. 매출 집계는 주문 총액 기준으로 계산합니다.
        </p>

        <section class="setup-section">
            <h2>매출 요약</h2>
            <dl class="setup-summary" aria-label="정산 요약" th:if="${settlementSummary != null}">
                <div>
                    <dt>전체 주문 매출</dt>
                    <dd th:text="${#numbers.formatDecimal(settlementSummary.totalOrderSales, 1, 2)}">0.00</dd>
                </div>
                <div>
                    <dt>정산 대기 매출</dt>
                    <dd th:text="${#numbers.formatDecimal(settlementSummary.unsettledSales, 1, 2)}">0.00</dd>
                </div>
                <div>
                    <dt>정산 완료 매출</dt>
                    <dd th:text="${#numbers.formatDecimal(settlementSummary.settledSales, 1, 2)}">0.00</dd>
                </div>
                <div>
                    <dt>집계 대상 주문 수</dt>
                    <dd th:text="${settlementSummary.totalOrderCount}">0</dd>
                </div>
                <div>
                    <dt>정산 대기 주문 수</dt>
                    <dd th:text="${settlementSummary.unsettledOrderCount}">0</dd>
                </div>
                <div>
                    <dt>정산 완료 주문 수</dt>
                    <dd th:text="${settlementSummary.settledOrderCount}">0</dd>
                </div>
            </dl>
        </section>

        <section class="setup-section">
            <h2>배송 완료 주문</h2>
            <form id="bulkSettlementForm" th:action="@{/admin/settlements/settle-bulk}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            </form>
            <div class="hero-actions" th:if="${!#lists.isEmpty(platformSettlementOrders)}">
                <button class="hero-button hero-button-primary" type="submit" form="bulkSettlementForm">
                    선택 주문 일괄 정산
                </button>
            </div>
            <p class="panel-copy" th:if="${#lists.isEmpty(platformSettlementOrders)}">
                정산 가능한 배송 완료 주문이 없습니다.
            </p>
            <div class="existing-company-card" th:each="orderItem : ${platformSettlementOrders}">
                <div class="commerce-list">
                    <span th:text="'주문 #' + ${orderItem.purchaseOrderId}">주문 #1</span>
                    <span th:text="${orderItem.settlementStatusLabel}">정산 대기</span>
                </div>
                <div class="commerce-list">
                    <span th:text="'회사: ' + ${orderItem.companyName}">회사</span>
                    <span th:text="'구매 담당: ' + ${orderItem.buyerName} + ' / ' + ${orderItem.buyerEmail}">구매 담당</span>
                </div>
                <div class="commerce-list">
                    <span th:text="'요청 #' + ${orderItem.purchaseRequestId}">요청</span>
                    <span th:text="'총액: ' + ${#numbers.formatDecimal(orderItem.totalAmount, 1, 2)}">총액</span>
                </div>
                <div class="commerce-list">
                    <span th:text="'배송 완료 시각: ' + ${#temporals.format(orderItem.deliveredAt, 'yyyy-MM-dd HH:mm')}">배송 완료 시각</span>
                    <span th:text="'주문 상태: ' + ${orderItem.orderStatusLabel}">주문 상태</span>
                </div>
                <div class="commerce-list" th:if="${orderItem.settlementStatus == 'SETTLED'}">
                    <span th:text="'정산 완료 시각: ' + ${#temporals.format(orderItem.settledAt, 'yyyy-MM-dd HH:mm')}">정산 완료 시각</span>
                    <span th:text="'정산 처리자: ' + ${orderItem.settledByName}">정산 처리자</span>
                </div>
                <div class="hero-actions" th:if="${orderItem.settlementStatus == 'UNSETTLED'}">
                    <form th:action="@{/admin/settlements/settle}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="purchaseOrderId" th:value="${orderItem.purchaseOrderId}">
                        <button class="hero-button hero-button-secondary" type="submit">주문 정산</button>
                    </form>
                    <label class="setup-hint settlement-bulk-toggle">
                        <input type="checkbox"
                               form="bulkSettlementForm"
                               name="purchaseOrderIds"
                               th:value="${orderItem.purchaseOrderId}">
                        일괄 정산에 포함
                    </label>
                </div>
            </div>
        </section>
    </section>
</th:block>
</body>
</html>
